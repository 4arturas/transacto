<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <title>Transacto – Transactions</title>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/antd/5.27.4/reset.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/antd/5.27.4/antd.min.js"></script>
    <style>
        body { margin: 0; background: #f0f2f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0057b3 0%, #003d7a 100%); }
        .login-container { width: 400px; padding: 0 20px; }
        .login-card { border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
        .login-brand { text-align: center; margin-bottom: 32px; }
        .login-brand .logo { font-size: 28px; font-weight: 700; color: #0057b3; letter-spacing: -0.5px; }
        .login-brand .logo span { color: #ff6b35; }
        .login-brand .tagline { font-size: 13px; color: #888; margin-top: 4px; }
        .topbar { background: #fff; border-bottom: 1px solid #e8e8e8; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 1px 4px rgba(0,0,0,0.04); position: sticky; top: 0; z-index: 100; }
        .topbar .logo { font-size: 20px; font-weight: 700; color: #0057b3; letter-spacing: -0.3px; }
        .topbar .logo span { color: #ff6b35; }
        .topbar .user-info { display: flex; align-items: center; gap: 12px; color: #555; font-size: 14px; }
        .content-wrap { max-width: 1400px; margin: 0 auto; padding: 24px; }
        .stat-card { border-radius: 10px; }
        .stat-card .stat-value { font-size: 32px; font-weight: 700; color: #0057b3; line-height: 1.2; }
        .stat-card .stat-label { font-size: 14px; color: #888; margin-top: 4px; }
        .filter-bar { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; align-items: flex-end; }
        .filter-bar .ant-form-item { margin-bottom: 0; }
        .role-tag-admin { color: #cf1322; background: #fff1f0; border-color: #ffa39e; font-weight: 500; }
        .role-tag-user { color: #389e0d; background: #f6ffed; border-color: #b7eb8f; font-weight: 500; }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
    const { useState, useEffect, useCallback } = React;
    const { Card, Form, Input, Button, Table, Tag, Tabs, message, Modal, Select, Spin, Result, Descriptions, Space, Typography, Avatar, Statistic, Row, Col, Tooltip, DatePicker } = antd;

    const tokenKey = "txn_admin_token";
    const userKey = "txn_admin_user";

    function getStoredToken() { return localStorage.getItem(tokenKey); }
    function getStoredUser() { try { return JSON.parse(localStorage.getItem(userKey) || "null"); } catch { return null; } }

    async function api(path, options = {}) {
        const token = getStoredToken();
        const headers = { "Content-Type": "application/json", ...options.headers };
        if (token) headers["Authorization"] = "Bearer " + token;
        const res = await fetch(path, { ...options, headers });
        if (!res.ok) {
            if (res.status === 401 || res.status === 403) {
                localStorage.removeItem(tokenKey);
                localStorage.removeItem(userKey);
                window.location.reload();
            }
            const data = await res.json().catch(() => ({}));
            throw new Error(data.error || "Request failed");
        }
        return await res.json();
    }

    function currencySymbol(cur) { return { USD: "$", EUR: "€", DKK: "kr" }[cur] || cur; }

    function fmt(n) {
        if (n == null) return "-";
        return Number(n).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function LoginForm({ onLogin }) {
        const [loading, setLoading] = useState(false);
        const [form] = Form.useForm();
        const handleSubmit = async (values) => {
            setLoading(true);
            try {
                const data = await api("/api/login", { method: "POST", body: JSON.stringify(values) });
                localStorage.setItem(tokenKey, data.accessToken);
                localStorage.setItem(userKey, JSON.stringify(data.user));
                message.success("Logged in as " + data.user.email);
                onLogin(data);
            } catch (err) {
                message.error(err.message);
            } finally { setLoading(false); }
        };
        return (
            <div className="login-page">
                <div className="login-container">
                    <Card className="login-card">
                        <div className="login-brand">
                            <div className="logo">Transact<span>o</span></div>
                            <div className="tagline">Transaction Monitoring</div>
                        </div>
                        <Form form={form} layout="vertical" onFinish={handleSubmit} autoComplete="off">
                            <Form.Item label="Email" name="email" rules={[{ required: true, message: "Enter your email" }]}>
                                <Input placeholder="admin@example.com" size="large"/>
                            </Form.Item>
                            <Form.Item label="Password" name="password" rules={[{ required: true, message: "Enter your password" }]}>
                                <Input.Password placeholder="password" size="large"/>
                            </Form.Item>
                            <Form.Item>
                                <Button type="primary" htmlType="submit" block size="large" loading={loading} style={{ height: 44, borderRadius: 8, background: "#0057b3", borderColor: "#0057b3" }}>Sign In</Button>
                            </Form.Item>
                        </Form>
                    </Card>
                </div>
            </div>
        );
    }

    function StatsRow() {
        const [stats, setStats] = useState(null);
        const [loading, setLoading] = useState(true);
        useEffect(() => {
            api("/api/stats").then(setStats).catch((e) => message.error(e.message)).finally(() => setLoading(false));
        }, []);
        if (loading) return <Spin style={{ display: "block", marginTop: 40 }}/>;
        if (!stats) return null;
        return (
            <Row gutter={[16, 16]} style={{ marginBottom: 24 }}>
                <Col xs={24} sm={8}>
                    <Card className="stat-card">
                        <div className="stat-value">{stats.total_events.toLocaleString()}</div>
                        <div className="stat-label">Processed Events</div>
                    </Card>
                </Col>
                <Col xs={24} sm={8}>
                    <Card className="stat-card">
                        <div className="stat-value">{stats.total_accounts.toLocaleString()}</div>
                        <div className="stat-label">Accounts</div>
                    </Card>
                </Col>
                <Col xs={24} sm={8}>
                    <Card className="stat-card">
                        {stats.volume_by_currency.map((v) => (
                            <div key={v.currency} style={{ display: "flex", justifyContent: "space-between", padding: "2px 0" }}>
                                <span style={{ fontWeight: 600 }}>{currencySymbol(v.currency)}</span>
                                <span>{fmt(v.total_volume)}</span>
                            </div>
                        ))}
                        <div className="stat-label" style={{ marginTop: 6 }}>Volume by Currency</div>
                    </Card>
                </Col>
            </Row>
        );
    }

    function TransactionsTab() {
        const [data, setData] = useState([]);
        const [total, setTotal] = useState(0);
        const [page, setPage] = useState(1);
        const [loading, setLoading] = useState(false);
        const [detailTxn, setDetailTxn] = useState(null);
        const [detailOpen, setDetailOpen] = useState(false);
        const pageSize = 25;

        const [filters, setFilters] = useState({ transactionId: "", accountId: "", currency: "", minAmount: "", maxAmount: "" });
        const [filterForm] = Form.useForm();

        const buildQuery = useCallback((p) => {
            const q = new URLSearchParams({ page: p, limit: pageSize });
            Object.entries(filters).forEach(([k, v]) => { if (v) q.set(k, v); });
            return q.toString();
        }, [filters]);

        const fetchData = useCallback(async (p) => {
            setLoading(true);
            try {
                const res = await api("/api/transactions?" + buildQuery(p));
                setData(res.data);
                setTotal(res.pagination.total);
            } catch (err) { message.error(err.message); } finally { setLoading(false); }
        }, [buildQuery]);

        useEffect(() => { fetchData(page); }, [page, fetchData]);

        const handleFilter = () => {
            const vals = filterForm.getFieldsValue();
            setFilters(vals);
            setPage(1);
        };

        const columns = [
            { title: "Transaction ID", dataIndex: "transaction_id_inner", key: "txn_id", ellipsis: true, width: 160 },
            { title: "Source", dataIndex: "source_account_id", key: "src", ellipsis: true, width: 140 },
            { title: "Destination", dataIndex: "destination_account_id", key: "dst", ellipsis: true, width: 140 },
            { title: "Amount", dataIndex: "amount", key: "amount", width: 120, render: (v) => fmt(v), sorter: true },
            { title: "Currency", dataIndex: "currency", key: "currency", width: 90 },
            {
                title: "Time", dataIndex: "processed_at", key: "time", width: 170,
                render: (v) => dayjs(v).format("YYYY-MM-DD HH:mm:ss"),
            },
            {
                title: "", key: "action", width: 60,
                render: (_, record) => (
                    <Button size="small" type="link" onClick={() => { setDetailTxn(record); setDetailOpen(true); }}>View</Button>
                ),
            },
        ];

        return (
            <>
                <Card style={{ marginBottom: 16, borderRadius: 10 }}>
                    <Form form={filterForm} layout="inline" className="filter-bar">
                        <Form.Item name="transactionId"><Input placeholder="Transaction ID" style={{ width: 160 }}/></Form.Item>
                        <Form.Item name="accountId"><Input placeholder="Account ID" style={{ width: 160 }}/></Form.Item>
                        <Form.Item name="currency">
                            <Select placeholder="Currency" style={{ width: 110 }} allowClear>
                                <Select.Option value="USD">USD</Select.Option>
                                <Select.Option value="EUR">EUR</Select.Option>
                                <Select.Option value="DKK">DKK</Select.Option>
                            </Select>
                        </Form.Item>
                        <Form.Item name="minAmount"><Input placeholder="Min amount" type="number" style={{ width: 120 }}/></Form.Item>
                        <Form.Item name="maxAmount"><Input placeholder="Max amount" type="number" style={{ width: 120 }}/></Form.Item>
                        <Form.Item><Button type="primary" onClick={handleFilter}>Filter</Button></Form.Item>
                    </Form>
                </Card>
                <Card className="stat-card">
                    <Table
                        dataSource={data}
                        columns={columns}
                        rowKey="event_id"
                        loading={loading}
                        size="small"
                        pagination={{ current: page, pageSize, total, onChange: setPage, showTotal: (t) => t + " transactions" }}
                    />
                </Card>
                <Modal title="Transaction Detail" open={detailOpen} onCancel={() => setDetailOpen(false)} footer={null} width={640}>
                    {detailTxn && (
                        <Descriptions column={1} bordered size="small">
                            <Descriptions.Item label="Event ID"><Typography.Text copyable style={{ fontSize: 12 }}>{detailTxn.event_id}</Typography.Text></Descriptions.Item>
                            <Descriptions.Item label="Transaction ID">{detailTxn.transaction_id_inner}</Descriptions.Item>
                            <Descriptions.Item label="Source Account">{detailTxn.source_account_id}</Descriptions.Item>
                            <Descriptions.Item label="Destination Account">{detailTxn.destination_account_id}</Descriptions.Item>
                            <Descriptions.Item label="Amount">{fmt(detailTxn.amount)} {detailTxn.currency}</Descriptions.Item>
                            <Descriptions.Item label="Description">{detailTxn.description || "-"}</Descriptions.Item>
                            <Descriptions.Item label="Event Type">{detailTxn.event_type}</Descriptions.Item>
                            <Descriptions.Item label="Event Timestamp">{dayjs(detailTxn.event_timestamp).format("YYYY-MM-DD HH:mm:ss")}</Descriptions.Item>
                            <Descriptions.Item label="Processed At">{dayjs(detailTxn.processed_at).format("YYYY-MM-DD HH:mm:ss")}</Descriptions.Item>
                        </Descriptions>
                    )}
                </Modal>
            </>
        );
    }

    function AccountsTab() {
        const [data, setData] = useState([]);
        const [total, setTotal] = useState(0);
        const [page, setPage] = useState(1);
        const [loading, setLoading] = useState(false);
        const [detailAcct, setDetailAcct] = useState(null);
        const [detailOpen, setDetailOpen] = useState(false);
        const pageSize = 25;
        const [filters, setFilters] = useState({ currency: "", accountIdSearch: "", minBalance: "", maxBalance: "" });
        const [filterForm] = Form.useForm();

        const buildQuery = useCallback((p) => {
            const q = new URLSearchParams({ page: p, limit: pageSize });
            Object.entries(filters).forEach(([k, v]) => { if (v) q.set(k, v); });
            return q.toString();
        }, [filters]);

        const fetchData = useCallback(async (p) => {
            setLoading(true);
            try {
                const res = await api("/api/accounts?" + buildQuery(p));
                setData(res.data);
                setTotal(res.pagination.total);
            } catch (err) { message.error(err.message); } finally { setLoading(false); }
        }, [buildQuery]);

        useEffect(() => { fetchData(page); }, [page, fetchData]);

        const handleFilter = () => {
            const vals = filterForm.getFieldsValue();
            setFilters(vals);
            setPage(1);
        };

        const columns = [
            { title: "Account ID", dataIndex: "account_id", key: "id", ellipsis: true, width: 200 },
            { title: "Balance", dataIndex: "balance", key: "balance", width: 150, render: (v) => fmt(v), sorter: true },
            { title: "Currency", dataIndex: "currency", key: "currency", width: 90 },
            { title: "Updated", dataIndex: "updated_at", key: "updated", width: 170, render: (v) => dayjs(v).format("YYYY-MM-DD HH:mm") },
            {
                title: "", key: "action", width: 60,
                render: (_, record) => (
                    <Button size="small" type="link" onClick={() => { setDetailAcct(record); setDetailOpen(true); }}>View</Button>
                ),
            },
        ];

        return (
            <>
                <Card style={{ marginBottom: 16, borderRadius: 10 }}>
                    <Form form={filterForm} layout="inline" className="filter-bar">
                        <Form.Item name="accountIdSearch"><Input placeholder="Account ID search" style={{ width: 180 }}/></Form.Item>
                        <Form.Item name="currency">
                            <Select placeholder="Currency" style={{ width: 110 }} allowClear>
                                <Select.Option value="USD">USD</Select.Option>
                                <Select.Option value="EUR">EUR</Select.Option>
                                <Select.Option value="DKK">DKK</Select.Option>
                            </Select>
                        </Form.Item>
                        <Form.Item name="minBalance"><Input placeholder="Min balance" type="number" style={{ width: 120 }}/></Form.Item>
                        <Form.Item name="maxBalance"><Input placeholder="Max balance" type="number" style={{ width: 120 }}/></Form.Item>
                        <Form.Item><Button type="primary" onClick={handleFilter}>Filter</Button></Form.Item>
                    </Form>
                </Card>
                <Card className="stat-card">
                    <Table
                        dataSource={data}
                        columns={columns}
                        rowKey="account_id"
                        loading={loading}
                        size="small"
                        pagination={{ current: page, pageSize, total, onChange: setPage, showTotal: (t) => t + " accounts" }}
                    />
                </Card>
                <Modal title="Account Detail" open={detailOpen} onCancel={() => setDetailOpen(false)} footer={null} width={500}>
                    {detailAcct && (
                        <Descriptions column={1} bordered size="small">
                            <Descriptions.Item label="Account ID"><Typography.Text copyable style={{ fontSize: 12 }}>{detailAcct.account_id}</Typography.Text></Descriptions.Item>
                            <Descriptions.Item label="Balance">{fmt(detailAcct.balance)} {detailAcct.currency}</Descriptions.Item>
                            <Descriptions.Item label="Currency">{detailAcct.currency}</Descriptions.Item>
                            <Descriptions.Item label="Updated">{dayjs(detailAcct.updated_at).format("YYYY-MM-DD HH:mm:ss")}</Descriptions.Item>
                        </Descriptions>
                    )}
                </Modal>
            </>
        );
    }

    function App() {
        const [session, setSession] = useState(() => {
            const token = getStoredToken();
            const user = getStoredUser();
            return token && user ? { token, user } : null;
        });
        const [activeKey, setActiveKey] = useState("dashboard");

        const handleLogin = (data) => {
            setSession({ token: data.accessToken, user: data.user });
            setActiveKey("dashboard");
        };

        const handleLogout = () => {
            localStorage.removeItem(tokenKey);
            localStorage.removeItem(userKey);
            setSession(null);
        };

        if (!session) return <LoginForm onLogin={handleLogin}/>;

        const initials = session.user.email.charAt(0).toUpperCase();

        return (
            <>
                <div className="topbar">
                    <div className="logo">Transact<span>o</span></div>
                    <div className="user-info">
                        <Avatar size={32} style={{ backgroundColor: "#0057b3", verticalAlign: "middle" }}>{initials}</Avatar>
                        <span>{session.user.email}</span>
                        <Tag className={"role-tag-" + session.user.role} color={session.user.role === "admin" ? "red" : "green"}>{session.user.role}</Tag>
                        <Button size="small" onClick={handleLogout} style={{ borderRadius: 6 }}>Logout</Button>
                    </div>
                </div>
                <div className="content-wrap">
                    <Tabs activeKey={activeKey} onChange={setActiveKey} style={{ marginTop: -8 }}>
                        <Tabs.TabPane tab="Dashboard" key="dashboard"><StatsRow/></Tabs.TabPane>
                        <Tabs.TabPane tab="Transactions" key="transactions"><TransactionsTab/></Tabs.TabPane>
                        <Tabs.TabPane tab="Accounts" key="accounts"><AccountsTab/></Tabs.TabPane>
                    </Tabs>
                </div>
            </>
        );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
