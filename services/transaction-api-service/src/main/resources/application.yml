server:
  port: 4000

spring:
  datasource:
    url: jdbc:postgresql://txn-db:5432/transaction_processor
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  jwt:
    secret: dev-jwt-secret
  jwt-service:
    url: http://jwt-api-service:3000
